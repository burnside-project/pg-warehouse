name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - "type: breaking change"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "bug"
  - title: "Documentation"
    labels:
      - "documentation"
  - title: "Infrastructure"
    labels:
      - "ci"
      - "dependencies"
      - "type: refactor"

version-resolver:
  major:
    labels:
      - "type: breaking change"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "documentation"
      - "type: refactor"
      - "type: performance"
      - "type: security"
  default: patch

autolabeler:
  - label: "documentation"
    files:
      - "docs/**"
      - "*.md"
  - label: "ci"
    files:
      - ".github/**"

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
