name: Mirror to Burnside Project Org

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm mirror push to public repo"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - name: Checkout source repo (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Strip private files and rebrand commits
        run: |
          git filter-repo \
            --invert-paths --path SPEC.md --path recipes/ --path .claude/ \
            --name-callback 'return b"Burnside Project"' \
            --email-callback 'return b"hello@burnsideproject.ai"' \
            --message-callback 'import re; return re.sub(rb"\nCo-[Aa]uthored-[Bb]y:.*", b"", message)' \
            --force

      - name: Push to burnside-project org
        run: |
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/burnside-project/pg-warehouse.git
          git push mirror main --force
          git push mirror --force --tags
