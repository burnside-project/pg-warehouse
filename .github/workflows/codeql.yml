name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build
        run: |
          go mod tidy
          CGO_ENABLED=1 go build ./...

      - uses: github/codeql-action/analyze@v4
        continue-on-error: true  # Upload requires GHAS on private repos; works on public mirror