name: Bug Report
description: Report a bug in pg-warehouse
labels: ["bug", "needs triage"]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues for this bug
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `pg-warehouse sync --table users`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or logs if applicable
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pg-warehouse version
      placeholder: "e.g. v0.1.0 (output of pg-warehouse version)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: pg_version
    attributes:
      label: PostgreSQL version
      placeholder: "e.g. 16.2"
  - type: input
    id: go_version
    attributes:
      label: Go version (if building from source)
      placeholder: "e.g. 1.23.0"
