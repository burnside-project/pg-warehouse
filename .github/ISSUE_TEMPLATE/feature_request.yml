name: Feature Request
description: Suggest a feature for pg-warehouse
labels: ["enhancement", "needs triage"]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues and the roadmap
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How should this feature work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about
