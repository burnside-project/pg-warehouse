# ============================================================================
# Metrics: Product Performance
# Feat table: feat.product_performance
# Grain: one row per product
# ============================================================================

name: product_performance
display_name: Product Performance Metrics
description: Product-level rankings by revenue, volume, and ratings
table: feat.product_performance
grain: one row per product

dimensions:
  - name: category_name
    type: text
    description: Product category
    synonyms: [category, department]

  - name: product_status
    type: text
    description: Product lifecycle status (active, inactive, discontinued)

  - name: stock_status
    type: text
    description: "Inventory status: in_stock, low_stock, out_of_stock"

measures:
  - name: total_orders
    type: integer
    description: Number of orders containing this product
    aggregation: SUM

  - name: units_sold
    type: integer
    description: Total units sold
    aggregation: SUM
    synonyms: [quantity_sold, volume]

  - name: total_revenue
    type: numeric
    description: Revenue generated by this product
    aggregation: SUM
    unit: USD
    synonyms: [revenue, sales]

  - name: avg_rating
    type: numeric
    description: Average customer review rating (1-5)
    aggregation: AVG
    synonyms: [rating, stars]

  - name: review_count
    type: integer
    description: Number of customer reviews
    aggregation: SUM

  - name: total_available
    type: integer
    description: Units available in stock
    aggregation: SUM

  - name: total_reserved
    type: integer
    description: Units reserved for orders
    aggregation: SUM

  - name: price_change_count
    type: integer
    description: Number of historical price changes
    aggregation: SUM

  - name: revenue_rank
    type: integer
    description: Product rank by revenue (1 = highest)

  - name: volume_rank
    type: integer
    description: Product rank by units sold (1 = highest)

  - name: rating_rank
    type: integer
    description: Product rank by average rating (1 = highest)

derived_metrics:
  - name: revenue_per_unit
    description: Average revenue per unit sold
    formula: "total_revenue / NULLIF(units_sold, 0)"
    unit: USD

  - name: conversion_indicator
    description: Reviews per unit sold (engagement proxy)
    formula: "review_count * 1.0 / NULLIF(units_sold, 0)"
